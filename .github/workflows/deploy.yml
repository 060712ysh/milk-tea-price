name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # 如果你的主分支叫 master，請改成 'master'

# 設定 GitHub Actions 的權限，允許它部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build # 這裡會執行你的編譯指令

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 編譯完的資料夾通常叫 dist。如果你的專案編譯完是 build，請改成 './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4