<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍奶價格觀察站</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>珍奶價格觀察站</h1>

        <!-- 輸入表單 -->
        <div class="form-box">

            <div class="form-row">
                <label>日期：</label>
                <div class="date-group" aria-label="日期輸入欄位">
                    <input type="text" id="yearInput" inputmode="numeric" maxlength="4" placeholder="YYYY" aria-label="年份">
                    <span class="date-separator">-</span>
                    <input type="text" id="monthInput" inputmode="numeric" maxlength="2" placeholder="MM" aria-label="月份">
                    <span class="date-separator">-</span>
                    <input type="text" id="dayInput" inputmode="numeric" maxlength="2" placeholder="DD" aria-label="日期">
                </div>
            </div>

            <div class="form-row">
                <label>商品名稱：</label>
                <input type="text" id="product" placeholder="例如：珍珠奶茶">
            </div>

            <div class="form-row price-row">
                <label>價格：</label>
                <input type="number" id="price" placeholder="例如：65">
            </div>

            <button id="addBtn">新增資料</button>

        </div>

        <hr>

        <!-- 查詢 -->
        <div class="search-box">

            <label>搜尋商品：</label>
            <input type="text" id="searchInput" placeholder="輸入商品名稱">

        </div>



        <hr>

        <!-- 記錄計數 -->
        <div id="recordCount" style="margin: 12px 0; font-weight: 600; color: #333;">目前共有 0 筆珍奶價格紀錄</div>

        <!-- 表格 -->
        <table>

            <thead>
                <tr>
                    <th>日期</th>
                    <th>商品名稱</th>
                    <th>價格</th>
                    <th>操作</th>
                </tr>
            </thead>

            <tbody id="priceTable">
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
